<!doctype html>
<html>
  <head>
    <title>Signing in...</title>
    <style>
      body {
        background: #0a0e1a;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        color: #f1f5f9;
      }
      .loader {
        text-align: center;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #1e293b;
        border-top-color: #2e75b6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 16px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="loader">
      <div class="spinner"></div>
      <p style="color: #94a3b8; font-size: 0.9rem">Signing you in...</p>
    </div>
    <script>
      async function getToken() {
        try {
          const res = await fetch("/api/auth/login/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username: "{{ username }}",
              password: "{{ password }}",
            }),
          });
          if (res.ok) {
            const data = await res.json();
            localStorage.setItem("cg_access_token", data.access);
            localStorage.setItem("cg_refresh_token", data.refresh);
            window.location.href = "/calendar/";
          } else {
            window.location.href = "/";
          }
        } catch (e) {
          window.location.href = "/";
        }
      }
      getToken();
    </script>
  </body>
</html>
