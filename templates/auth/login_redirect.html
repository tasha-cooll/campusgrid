<!DOCTYPE html>
<html>
<head>
  <title>Signing in...</title>
  <style>
    body {
      background: #1A1612;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: Inter, sans-serif;
      color: #E8DCC8;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid #3D3426;
      border-top-color: #C9A84C;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #9C8F7A; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div style="text-align:center;">
    <div class="spinner"></div>
    <p>Signing you in...</p>
  </div>
  <script>
    (async function() {
      try {
        const res = await fetch('/api/auth/login/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: '{{ username }}',
            password: '{{ password }}'
          })
        });
        if (res.ok) {
          const data = await res.json();
          localStorage.setItem('cg_access_token', data.access);
          localStorage.setItem('cg_refresh_token', data.refresh);
        }
      } catch(e) {}
      window.location.href = '{{ redirect_to }}';
    })();
  </script>
</body>
</html>
